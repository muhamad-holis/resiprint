name: Build Android (TWA)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Jenis build yang dihasilkan"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - "android-v*"

jobs:
  build-android:
    name: Build APK / AAB via Bubblewrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Restore keystore (release only)
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            # Path harus sama persis dengan "signingKey.path" di twa-manifest.json
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/android.keystore
          else
            echo "ANDROID_KEYSTORE_BASE64 belum diset di GitHub Secrets — build release akan gagal." >&2
          fi

      - name: Build Debug (Bubblewrap build, tanpa signing)
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: android
        run: |
          # twa-manifest.json sudah ada, jadi "bubblewrap build" akan
          # men-generate project Gradle (gradlew, app/, dll) SEKALIGUS
          # meng-compile-nya. --skipSigning karena debug tidak butuh keystore.
          bubblewrap build --skipPwaValidation --skipSigning

      - name: Build Release (Bubblewrap build, dengan signing)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: android
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          bubblewrap build --skipPwaValidation

      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: resiprint-debug-apk
          # --skipSigning menghasilkan APK unsigned (bukan folder app/build/outputs)
          path: android/app-release-unsigned-aligned.apk

      - name: Upload Release AAB & APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: resiprint-release-bundle
          path: |
            android/app-release-bundle.aab
            android/app-release-signed.apk
