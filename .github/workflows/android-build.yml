name: Build Android (TWA)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Jenis build yang dihasilkan"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - "android-v*"

jobs:
  build-android:
    name: Build APK / AAB via Bubblewrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Restore keystore (release only)
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          else
            echo "ANDROID_KEYSTORE_BASE64 belum diset di GitHub Secrets — build release akan gagal." >&2
          fi

      - name: Build with Gradle (Debug APK)
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: android
        run: |
          chmod +x gradlew || true
          ./gradlew assembleDebug

      - name: Build with Gradle (Release AAB + APK)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew || true
          ./gradlew bundleRelease assembleRelease

      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: resiprint-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload Release AAB & APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: resiprint-release-bundle
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/apk/release/*.apk
